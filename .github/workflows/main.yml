name: Self-Healing Deep-Intelligence Game Build

on:
  workflow_dispatch: # এক ক্লিকে ম্যানুয়ালি রান করার জন্য

jobs:
  build-ios:
    name: Advanced Self-Healing Compiler
    runs-on: macos-14

    steps:
      # ১. ডেল্টা গেমের মূল কোড নামানো
      - name: Deep Checkout Source Code
        uses: actions/checkout@v4
        with:
          repository: 'rileytestut/Delta'
          ref: 'main'
          submodules: 'recursive'

      # ২. ব্রেন পার্ট: ডাইনামিক এক্সকোড ফাইন্ডার ও সিলেকশন
      - name: Smart Auto-Detect & Lock Latest Xcode Version
        run: |
          echo "🔍 Scanning system for all available Xcode versions..."
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)
          echo "🧠 Deep Brain Decision: Selected Latest Xcode -> $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version

      # ৩. মিসিং সোর্স কোডগুলো ডাইরেক্ট ক্লোন করা
      - name: Force Fetch Submodule Codebases
        run: |
          rm -rf External/DeltaOperator External/Roxas
          git clone --recursive https://github.com/rileytestut/DeltaOperator.git External/DeltaOperator || true
          git clone --recursive https://github.com/rileytestut/Roxas.git External/Roxas || true

      # ৪. আল্ট্রা-ইন্টেলিজেন্স পার্ট: রিয়েল XCFrameworkস জিপ ডাউনলোডার ও জেনারেটর
      # কার্থেজকে বাইপাস করে অফিশিয়াল গিটহাব রিলিজ থেকে আসল বাইনারি ফ্রেমওয়ার্ক ইনজেক্ট করা হচ্ছে
      - name: Dynamic Framework Injector Engine
        run: |
          echo "🧠 Deep Brain Analytics: Fetching Pre-compiled Official XCFrameworks..."
          
          # তৈরি করছি ব্যাকআপ ডিরেক্টরি
          mkdir -p External/DeltaOperator/Frameworks/
          mkdir -p External/Roxas/Frameworks/
          
          # ১. ডেল্টা অপারেটর (OperatorKit) এর আসল রিলিজ জিপ ডাউনলোড ও এক্সট্রাক্ট করা
          echo "📥 Downloading OperatorKit.xcframework..."
          curl -L -o operatorkit.zip https://github.com/rileytestut/DeltaOperator/releases/download/1.0/OperatorKit.xcframework.zip || true
          if [ -f "operatorkit.zip" ]; then
            unzip -o operatorkit.zip -d External/DeltaOperator/Frameworks/ || true
            rm -f operatorkit.zip
          fi
          
          # ২. রক্সাস (Roxas) এর আসল রিলিজ জিপ ডাউনলোড ও এক্সট্রাক্ট করা
          echo "📥 Downloading Roxas.xcframework..."
          curl -L -o roxas.zip https://github.com/rileytestut/Roxas/releases/download/1.0/Roxas.xcframework.zip || true
          if [ -f "roxas.zip" ]; then
            unzip -o roxas.zip -d External/Roxas/Frameworks/ || true
            rm -f roxas.zip
          fi
          
          echo "🛠️ Verification: Checking if real frameworks are successfully placed..."
          ls -la External/DeltaOperator/Frameworks/
          ls -la External/Roxas/Frameworks/

      # ৫. এক্সকোড ১৬ দিয়ে অ্যাডভান্সড আর্কিটেকচার বিল্ড রান করা
      - name: Advanced Compiling & Archiving
        run: |
          xcodebuild archive \
            -workspace Delta.xcworkspace \
            -scheme "Delta" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $GITHUB_WORKSPACE/build/Delta.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            VALIDATE_WORKSPACE=NO \
            ONLY_ACTIVE_ARCH=YES \
            ENABLE_PREVIEWS=NO

      # ৬. রুট লেভেল থেকে আনসাইনড .ipa তৈরি ও প্যাকেজিং
      - name: Packaging into Unsigned IPA
        run: |
          mkdir -p $GITHUB_WORKSPACE/Payload
          
          if [ -d "$GITHUB_WORKSPACE/build/Delta.xcarchive/Products/Applications/Delta.app" ]; then
            cp -r $GITHUB_WORKSPACE/build/Delta.xcarchive/Products/Applications/Delta.app $GITHUB_WORKSPACE/Payload/
          else
            echo "Fallback Path Search Activation..."
            cp -r $GITHUB_WORKSPACE/build/Delta.xcarchive/Products/Applications/*.app $GITHUB_WORKSPACE/Payload/
          fi
          
          cd $GITHUB_WORKSPACE
          zip -r Delta_DeepIntelligence_Unsigned.ipa Payload
          echo "Unsigned IPA Generation Complete!"

      # ৭. ফাইনাল আউটপুট আর্টফ্যাক্ট আপলোড
      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Delta-SelfHealed-Game-IPA
          path: ${{ github.workspace }}/Delta_DeepIntelligence_Unsigned.ipa
          retention-days: 7
