name: Build AutoCAD DWG Viewer IPA

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # এর মাধ্যমে আপনি ম্যানুয়ালিও বিল্ড স্টার্ট করতে পারবেন

jobs:
  build:
    name: Build IPA using macOS Runner
    runs-on: macos-13 # অ্যাপল সিলিকন/ইনটেল ম্যাক ওএস রানার এক্সকোড ১৫ সহ

    steps:
      # ১. রিপোজিটরি থেকে কোড চেকআউট করা
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. সঠিক এক্সকোড ভার্সন সিলেক্ট করা
      - name: Set up Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
          xcodebuild -version

      # ৩. কোকোয়াপডস বা ডিপেন্ডেন্সি ইনস্টল করা (যদি প্রজেক্টে থাকে)
      - name: Install Pods Dependencies
        run: |
          if [ -f "Podfile" ]; then
            pod install
          else
            echo "No Podfile found, skipping pod install."
          fi

      # ৪. এক্সকোড প্রজেক্ট বিল্ড করা (Unsigned / Simulator বা Generic iOS Device এর জন্য)
      - name: Build Xcode Project
        run: |
          xcodebuild clean build \
            -project "DWGViewer.xcodeproj" \
            -scheme "DWGViewer" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      # ৫. বিল্ড হওয়া .app ফাইলকে .ipa ফরম্যাটে কনভার্ট করা (The Professional Trick)
      - name: Create IPA Package
        run: |
          mkdir -p Payload
          # বিল্ড পাথ থেকে .app ফাইলটি Payload ফোল্ডারে কপি করুন (আপনার প্রজেক্টের সঠিক পাথ দিন)
          cp -r build/Release-iphoneos/DWGViewer.app Payload/
          # জিপ করে .ipa এক্সটেনশন দেওয়া
          zip -r DWGViewer.ipa Payload
          echo "IPA Created Successfully!"

      # ৬. তৈরি হওয়া .ipa ফাইলটি গিটহাবে আপলোড করা (যাতে আপনি ডাউনলোড করতে পারেন)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoCAD-DWG-Viewer-IPA
          path: DWGViewer.ipa
