name: Build Unsigned CAD Viewer IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # গিটহাব ড্যাশবোর্ড থেকে ম্যানুয়ালি রান করার অপশন

jobs:
  build:
    runs-on: macos-latest # অ্যাপল অ্যাপ কম্পাইল করার জন্য অফিসিয়াল ম্যাক রানার

    steps:
      # ১. গিটহাব রিপোজিটরি থেকে কোড রানারে নামানো (Checkout)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. সঠিক Xcode ভার্সন সিলেক্ট করা
      - name: Set up Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      # ৩. ডিপেন্ডেন্সি বা পড ফাইল থাকলে তা ইনস্টল করা (যেমন: CocoaPods)
      - name: Install Pods (If applicable)
        run: |
          if [ -f "Podfile" ]; then
            pod install
          fi

      # ৪. প্রোজেক্ট বিল্ড করা (কোড সাইনিং সম্পূর্ণ ডিজেবল রেখে)
      # নোট: YourProjectName এবং YourSchemeName আপনার প্রোজেক্ট অনুযায়ী পরিবর্তন করে নিবেন।
      - name: Build Xcode Workspace (Unsigned)
        run: |
          xcodebuild clean build \
            -workspace YourProjectName.xcworkspace \
            -scheme YourSchemeName \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      # ৫. বিল্ড হওয়া .app ফাইলকে প্রফেশনাল Unsigned .ipa ফরম্যাটে প্যাকেজ করা
      - name: Package Unsigned IPA
        run: |
          # কাস্টম পেওলোড ডিরেক্টরি তৈরি
          mkdir -p build/Payload
          
          # DerivedData থেকে সদ্য বিল্ড হওয়া .app ফোল্ডারটি খুঁজে বের করা
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found! Check your build step."
            exit 1
          fi
          
          # .app ফাইলটি Payload ফোল্ডারে কপি করা
          cp -r "$APP_PATH" build/Payload/
          
          # Payload ফোল্ডারটিকে জিপ (Zip) করে .ipa এক্সটেনশনে রূপান্তর করা
          cd build
          zip -r CAD_Viewer_Unsigned.ipa Payload
          echo "Unsigned IPA Created Successfully!"

      # ৬. তৈরি হওয়া .ipa ফাইলটি গিটহাবে ডাউনলোড করার জন্য আপলোড করা
      - name: Upload IPA Artifact
        uses: actions/artifacts@v4
        with:
          name: CAD-Viewer-Unsigned-IPA
          path: build/CAD_Viewer_Unsigned.ipa
