name: Build Massive 3D Game (Doom 3 iOS Unsigned IPA)

on:
  workflow_dispatch: # গিটহাব থেকে ম্যানুয়ালি রান করার জন্য

jobs:
  build-ios:
    name: Build Native C++ 3D Game
    runs-on: macos-14

    steps:
      # ১. গেমের বিশাল ৩D সোর্স কোড সরাসরি ক্লোন করা (সব সাব-মডিউলসহ)
      - name: Checkout Doom 3 iOS Source Code
        uses: actions/checkout@v4
        with:
          repository: 'fabiensanglard/d3m' # এটি একটি বিশ্ববিখ্যাত এবং বিশাল সি++ গেম ইঞ্জিন পোর্ট
          ref: 'master'
          submodules: 'recursive'

      # ২. সঠিক Xcode ভার্সন লক করা
      - name: Set up Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      # ৩. কোনো Apple ID বা কোড সাইনিং ছাড়াই সরাসরি Xcode প্রজেক্ট আর্কাইভ করা
      # এখানে আমরা সরাসরি .xcodeproj ফাইলটি বিল্ড করছি, তাই কোনো CMake এরর আসবে না
      - name: Build and Archive Project
        run: |
          xcodebuild archive \
            -project *.xcodeproj \
            -scheme "d3m" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $GITHUB_WORKSPACE/build/Doom3.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      # ৪. আর্কাইভ থেকে মূল .app ফাইল বের করে Unsigned .ipa প্যাক করা
      - name: Packaging into Unsigned IPA
        run: |
          mkdir -p $GITHUB_WORKSPACE/Payload
          
          # তৈরি হওয়া বিশাল .app ফাইলটি পেলোড ফোল্ডারে নেওয়া হচ্ছে
          cp -r $GITHUB_WORKSPACE/build/Doom3.xcarchive/Products/Applications/*.app $GITHUB_WORKSPACE/Payload/
          
          # পেলোড ফোল্ডারটিকে জিপ করে .ipa ফরম্যাট দেওয়া হচ্ছে
          cd $GITHUB_WORKSPACE
          zip -r Doom3_Unsigned.ipa Payload
          
          echo "Massive 3D Game Unsigned IPA successfully created!"

      # ৫. তৈরি হওয়া .ipa ফাইলটি গিটহাবে আপলোড করা
      - name: Upload Massive Game IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Doom3-3D-Game-IPA
          path: ${{ github.workspace }}/Doom3_Unsigned.ipa
          retention-days: 7
