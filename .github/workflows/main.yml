# ==========================================
# অংশ ১: GITHUB ACTIONS WORKFLOW (.yml)
# ফাইলটি আপনার প্রজেক্টের এই পাথে সেভ করুন: .github/workflows/build.yml
# ==========================================
name: Build Unsigned iOS IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    name: Compile and Package App using macOS Runner
    runs-on: macos-13 

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build Xcode Project (Unsigned)
        run: |
          xcodebuild clean build \
            -project *.xcodeproj \
            -scheme "DWGViewer" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package Unsigned App into IPA Format
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/ -name "*.app" -type d | head -n 1)
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r DWGViewer_Unsigned.ipa Payload
          echo "IPA creation successful!"

      - name: Upload Unsigned Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned-iOS-IPA
          path: build/DWGViewer_Unsigned.ipa
          retention-days: 7

