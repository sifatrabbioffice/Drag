name: Build Large 3D Game (SuperTuxKart Unsigned IPA)

on:
  workflow_dispatch: # গিটহাব থেকে ম্যানুয়ালি এক ক্লিকে রান করার জন্য

jobs:
  build-ios:
    name: Compile Massive C++ Game
    runs-on: macos-14 # অ্যাপলের লেটেস্ট রানার এনভায়রনমেন্ট

    steps:
      # ১. গেমের অফিশিয়াল এবং বিশাল সোর্স কোড ডাউনলোড করা
      - name: Checkout SuperTuxKart Source Code
        uses: actions/checkout@v4
        with:
          repository: 'supertuxkart/stk-code'
          ref: 'master'
          submodules: 'recursive' # এই বড় গেমের ভেতরের সব থ্রিডি ইঞ্জিন পার্টস ডাউনলোড করবে

      # ২. সঠিক Xcode ভার্সন লক করা
      - name: Set up Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      # ৩. বড় সি++ প্রজেক্টের জন্য বিল্ড ডিরেক্টরি ও কনফিগারেশন তৈরি (CMake/Xcode generation)
      # নোট: এই গেমটিতে সরাসরি এক্সকোড প্রজেক্ট জেনারেট করার জন্য বিল্ড স্ক্রিপ্ট ডিফাইন করা থাকে।
      - name: Prepare Xcode Workspace
        run: |
          mkdir build
          cd build
          # আইওএস ডিভাইসের জন্য এক্সকোড প্রজেক্ট মেক করা হচ্ছে
          cmake .. -G"Xcode" -DCMAKE_TOOLCHAIN_FILE=../cmake/ios.toolchain.cmake -DPLATFORM=OS64

      # ৪. কোনো সাইনিং (Apple ID) ছাড়াই xcodebuild দিয়ে গেমটি আর্কাইভ করা
      - name: Build and Archive Massive Game
        run: |
          cd build
          xcodebuild archive \
            -xcodeproj SuperTuxKart.xcodeproj \
            -scheme SuperTuxKart \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $GITHUB_WORKSPACE/build/SuperTuxKart.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      # ৫. আর্কাইভ থেকে মূল .app ফাইল বের করে Unsigned .ipa তৈরি করা
      - name: Packaging into Unsigned IPA
        run: |
          mkdir -p $GITHUB_WORKSPACE/Payload
          
          # তৈরি হওয়া বিশাল থ্রিডি গেমের .app ফাইলটি পেলোড ফোল্ডারে কপি করা হচ্ছে
          cp -r $GITHUB_WORKSPACE/build/SuperTuxKart.xcarchive/Products/Applications/*.app $GITHUB_WORKSPACE/Payload/
          
          # পেলোড ফোল্ডারটিকে জিপ করে আইপিএ ফরম্যাট দেওয়া হচ্ছে
          cd $GITHUB_WORKSPACE
          zip -r SuperTuxKart_Unsigned.ipa Payload
          
          echo "Massive 3D Game IPA successfully created!"

      # ৬. তৈরি হওয়া রেডি .ipa ফাইলটি গিটহাবে আপলোড করা
      - name: Upload Massive Game IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperTuxKart-3D-Game-IPA
          path: ${{ github.workspace }}/SuperTuxKart_Unsigned.ipa
          retention-days: 7 # ডাউনলোড করার জন্য ৭ দিন সময় থাকবে
