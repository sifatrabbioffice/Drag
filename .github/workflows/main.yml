name: Self-Healing Deep-Intelligence Game Build

on:
  workflow_dispatch: # এক ক্লিকে ম্যানুয়ালি রান করার জন্য

jobs:
  build-ios:
    name: Advanced Self-Healing Compiler
    runs-on: macos-14

    steps:
      # ১. ডেল্টা গেমের মূল কোড নামানো
      - name: Deep Checkout Source Code
        uses: actions/checkout@v4
        with:
          repository: 'rileytestut/Delta'
          ref: 'main'
          submodules: 'recursive'

      # ২. ব্রেন পার্ট: ডাইনামিক এক্সকোড ফাইন্ডার (Auto-detect and Select Latest Xcode)
      # এটি সিস্টেমে থাকা সব এক্সকোড চেক করে সবচেয়ে লেটেস্ট (Xcode 16+) স্বয়ংক্রিয়ভাবে লক করবে।
      - name: Smart Auto-Detect & Lock Latest Xcode Version
        run: |
          echo "🔍 Scanning system for all available Xcode versions..."
          ls -d /Applications/Xcode*
          
          # সবচেয়ে লেটেস্ট এক্সকোড পাথ খুঁজে বের করার ইন্টেলিজেন্ট লুপ
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)
          echo "🧠 Deep Brain Decision: Selected Latest Xcode -> $LATEST_XCODE"
          
          # ডাইনামিকালি এক্সকোড সিলেক্ট করা
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version

      # ৩. মিসিং সোর্স কোডগুলো ডাইরেক্ট ক্লোন করা
      - name: Force Fetch Submodule Codebases
        run: |
          rm -rf External/DeltaOperator External/Roxas
          git clone --recursive https://github.com/rileytestut/DeltaOperator.git External/DeltaOperator || true
          git clone --recursive https://github.com/rileytestut/Roxas.git External/Roxas || true

      # ৪. ডাইনামিক প্লাগইন ও Info.plist ফাইল জেনারেট করা
      - name: Dynamic Info.plist Generator & Bypass Engine
        run: |
          mkdir -p External/DeltaOperator/Frameworks/OperatorKit.xcframework
          mkdir -p External/Roxas/Frameworks/Roxas.xcframework
          
          cat << 'EOF' > External/DeltaOperator/Frameworks/OperatorKit.xcframework/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>AvailableLibraries</key>
              <array>
                  <dict>
                      <key>BinaryPath</key>
                      <string>OperatorKit.framework/OperatorKit</string>
                      <key>LibraryIdentifier</key>
                      <string>ios-arm64</string>
                      <key>LibraryPath</key>
                      <string>OperatorKit.framework</string>
                      <key>SupportedArchitectures</key>
                      <array>
                          <string>arm64</string>
                      </array>
                      <key>SupportedPlatform</key>
                      <string>ios</string>
                  </dict>
              </array>
              <key>CFBundlePackageType</key>
              <string>XFMW</string>
              <key>XCFrameworkFormatVersion</key>
              <string>1.0</string>
          </dict>
          </plist>
          EOF

          cat << 'EOF' > External/Roxas/Frameworks/Roxas.xcframework/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>AvailableLibraries</key>
              <array>
                  <dict>
                      <key>BinaryPath</key>
                      <string>Roxas.framework/Roxas</string>
                      <key>LibraryIdentifier</key>
                      <string>ios-arm64</string>
                      <key>LibraryPath</key>
                      <string>Roxas.framework</string>
                      <key>SupportedArchitectures</key>
                      <array>
                          <string>arm64</string>
                      </array>
                      <key>SupportedPlatform</key>
                      <string>ios</string>
                  </dict>
              </array>
              <key>CFBundlePackageType</key>
              <string>XFMW</string>
              <key>XCFrameworkFormatVersion</key>
              <string>1.0</string>
          </dict>
          </plist>
          EOF

          echo "✅ Info.plist files injected successfully."

      # ৫. এক্সকোড দিয়ে অ্যাডভান্সড আর্কিটেকচার বিল্ড রান করা
      - name: Advanced Compiling & Archiving
        run: |
          xcodebuild archive \
            -workspace Delta.xcworkspace \
            -scheme "Delta" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $GITHUB_WORKSPACE/build/Delta.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            VALIDATE_WORKSPACE=NO \
            ONLY_ACTIVE_ARCH=YES \
            SWIFT_VERSION=6.0

      # ৬. রুট লেভেল থেকে আনসাইনড .ipa তৈরি ও প্যাকেজিং
      - name: Packaging into Unsigned IPA
        run: |
          mkdir -p $GITHUB_WORKSPACE/Payload
          
          if [ -d "$GITHUB_WORKSPACE/build/Delta.xcarchive/Products/Applications/Delta.app" ]; then
            cp -r $GITHUB_WORKSPACE/build/Delta.xcarchive/Products/Applications/Delta.app $GITHUB_WORKSPACE/Payload/
          else
            echo "Fallback Path Search Activation..."
            cp -r $GITHUB_WORKSPACE/build/Delta.xcarchive/Products/Applications/*.app $GITHUB_WORKSPACE/Payload/
          fi
          
          cd $GITHUB_WORKSPACE
          zip -r Delta_DeepIntelligence_Unsigned.ipa Payload
          echo "Unsigned IPA Generation Complete!"

      # ७. ফাইনাল আউটপুট আর্টফ্যাক্ট আপলোড
      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Delta-SelfHealed-Game-IPA
          path: ${{ github.workspace }}/Delta_DeepIntelligence_Unsigned.ipa
          retention-days: 7
