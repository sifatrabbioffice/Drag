name: Build Massive iOS Game (Delta Unsigned IPA)

on:
  workflow_dispatch: # গিটহাব থেকে ম্যানুয়ালি রান করার জন্য

jobs:
  build-ios:
    name: Build Native iOS Game
    runs-on: macos-14

    steps:
      # ১. ডেল্টা গেমের সঠিক এবং লেটেস্ট মেইন ডিরেক্টরি ডাউনলোড করা (ব্রাঞ্চ ফিক্সড)
      - name: Checkout Delta Source Code
        uses: actions/checkout@v4
        with:
          repository: 'rileytestut/Delta'
          ref: 'main' # ডেল্টা গেমের আসল কোডবেস এখন 'main' ব্রাঞ্চে থাকে
          fetch-depth: 1 # দ্রুত ডাউনলোডের জন্য মেমোরি অপ্টিমাইজড ক্লোন

      # ২. সাব-মডিউলগুলো যদি মূল ক্লোনে মিস হয়, তবে এটি অটোমেটিক ফোর্সফুলি ডাউনলোড করবে
      - name: Auto-Fix and Sync Missing Submodules
        run: |
          git submodule init
          git submodule update --recursive --remote || true
          echo "Submodules synced successfully!"

      # ৩. সঠিক Xcode ভার্সন লক করা
      - name: Set up Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      # ৪. কোনো Apple ID বা কোড সাইনিং ছাড়াই সরাসরি Xcode Workspace আর্কাইভ করা
      - name: Build and Archive Project
        run: |
          xcodebuild archive \
            -workspace Delta.xcworkspace \
            -scheme "Delta" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $GITHUB_WORKSPACE/build/Delta.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      # ৫. আর্কাইভ থেকে মূল .app ফাইল বের করে Unsigned .ipa প্যাক করা
      - name: Packaging into Unsigned IPA
        run: |
          mkdir -p $GITHUB_WORKSPACE/Payload
          
          # তৈরি হওয়া মূল গেমের .app ফাইলটি পেলোড ফোল্ডারে কপি করা হচ্ছে
          cp -r $GITHUB_WORKSPACE/build/Delta.xcarchive/Products/Applications/*.app $GITHUB_WORKSPACE/Payload/
          
          # পেলোড ফোল্ডারটিকে জিপ করে .ipa ফরম্যাট দেওয়া হচ্ছে
          cd $GITHUB_WORKSPACE
          zip -r Delta_Unsigned.ipa Payload
          
          echo "Delta Unsigned IPA successfully created!"

      # ৬. তৈরি হওয়া .ipa ফাইলটি গিটহাবে আপলোড করা
      - name: Upload Delta Game IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Delta-Game-IPA
          path: ${{ github.workspace }}/Delta_Unsigned.ipa
          retention-days: 7
